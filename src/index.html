  .session-log-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 6px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    min-width: 0;
  }
  .session-log-item:hover { background: var(--surface2); }
  .session-log-item:hover .session-log-add { opacity: 1; }
  .session-log-thumb {
    width: 38px; height: 24px;
    border-radius: 3px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface3);
  }
  .session-log-info { flex: 1; overflow: hidden; min-width: 0; }
  .session-log-title {
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .session-log-dur {
    font-size: 9px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .session-log-add {
    opacity: 0;
    flex-shrink: 0;
    background: none;
    border: 0.5px solid var(--border);
    color: var(--muted);
    border-radius: 50%;
    width: 18px; height: 18px;
    font-size: 13px;
    font-weight: 300;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: all 0.12s;
  }
  .session-log-add:hover { background: var(--accent); border-color: var(--accent); color: #000; }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Splash screen ── */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: radial-gradient(ellipse 80% 70% at 50% 45%, #1c1c26 0%, #0e0e16 50%, #050508 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.5s ease;
  }
  #splash.fade-out {
    opacity: 0;
    pointer-events: none;
  }
  #splash .splash-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #splash .splash-tag {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: -14px;
  }
  #splash .splash-spinner {
    width: 22px; height: 22px;
    border: 2px solid rgba(255,255,255,0.10);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-top: 8px;
  }
</style>
</head>
<body>

<!-- Splash screen — fades out once config-loaded fires -->
<div id="splash">
  <div class="splash-logo">TableTunes</div>
  <div class="splash-tag">GM Music Controller</div>
  <div class="splash-spinner"></div>
</div>

<div id="app">

  <!-- Titlebar -->
  <div id="titlebar">
    <span class="logo">TableTunes</span>
    <span class="tagline">GM Music Controller</span>
    <div class="win-controls">
      <button class="win-btn" onclick="api.minimize()">─</button>
      <button class="win-btn close" onclick="api.close()">✕</button>
    </div>
  </div>

  <div id="main">

    <!-- Sidebar -->
    <div id="sidebar">

      <!-- Bot Setup -->
      <div class="sidebar-section">
        <h3>Discord Bot</h3>
        <div class="bot-status">
          <div class="status-dot" id="bot-dot"></div>
          <span id="bot-status-text">Not connected</span>
        </div>
        <div id="bot-setup">
          <div class="input-group">
            <label>Bot Token</label>
            <input type="password" id="bot-token" placeholder="Paste token..." />
          </div>
          <div class="input-group">
            <label>Server ID</label>
            <input type="text" id="guild-id" placeholder="Right-click server → Copy ID" />
          </div>
          <button class="btn btn-primary" onclick="connectBot()">Connect Bot</button>
        </div>
        <div id="channel-section">
          <div class="input-group">
            <label>Voice Channel</label>
            <select id="channel-select">
              <option value="">Select channel...</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="joinChannel()">Join Channel</button>
          <button class="btn btn-danger" onclick="leaveChannel()" style="margin-top:6px">Leave Channel</button>
        </div>
      </div>

      <!-- Volume -->
      <div id="volume-section">
        <h3 style="font-size:9px;text-transform:uppercase;letter-spacing:1.8px;color:var(--muted);margin-bottom:10px;font-weight:600;">Volume</h3>
        <div class="volume-row">
          <span style="font-size:14px;color:var(--muted);">🔊</span>
          <input type="range" id="volume-slider" min="0" max="100" value="80"
            oninput="onVolume(this.value)" />
          <span id="vol-display">80%</span>
        </div>
      </div>

      <!-- Session Log -->
      <div class="sidebar-section" id="session-log-section">
        <h3>Session Log</h3>
        <div id="session-log-list">
          <div class="session-log-empty">No tracks played yet</div>
        </div>
      </div>

    </div>

    <!-- Center -->
    <div id="center">

      <!-- Now Playing Display -->
      <div id="player-container">
        <div id="np-banner">
          <div id="np-banner-idle">
            <div class="idle-icon">🎵</div>
            <p>Search for a track or browse playlists to begin</p>
          </div>
          <div id="np-banner-active" style="display:none;">
            <img id="np-banner-thumb" src="" />
            <div id="np-banner-overlay">
              <div id="np-banner-title"></div>
              <div id="np-banner-channel"></div>
            </div>
            <!-- Embedded seek bar — YouTube style, pinned to bottom of banner -->
            <div id="seek-embed">
              <div id="seek-times">
                <span class="seek-time" id="seek-current">0:00</span>
                <span class="seek-time" id="seek-total">0:00</span>
              </div>
              <div id="seek-track-wrap">
                <div id="seek-fill-overlay"></div>
                <input type="range" id="seek-slider" min="0" max="100" value="0" />
              </div>
            </div>
          </div>
        </div>
        <div id="player-controls-bar">
          <!-- Track info -->
          <div id="np-info-bar">
            <div class="np-title np-idle" id="np-title">Nothing playing</div>
            <div class="np-channel" id="np-channel"></div>
          </div>
          <!-- Playback controls: Restart · Play/Pause · Skip -->
          <div class="playback-controls">
            <button class="ctrl-btn" id="restart-btn" onclick="restartTrack()" title="Restart track">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
            </button>
            <button class="ctrl-btn" id="pause-btn" onclick="handlePlayPause()" title="Pause/Resume">
              <svg id="pause-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="ctrl-btn" id="skip-btn" onclick="doSkip(this)" title="Skip to next">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Search + Results card -->
      <div id="search-card">
        <!-- Search -->
        <div id="search-area">
          <div class="search-input-row">
            <div class="search-input-wrap">
              <input type="text" id="search-input"
                placeholder="Search YouTube or paste a URL..."
                onkeydown="if(event.key==='Enter') doSearch()"
                oninput="onSearchInput(this.value)"
                onfocus="showSearchHistory()"
                onblur="hideSearchHistory()" />
              <div id="search-history-dropdown" class="search-history-dropdown" style="display:none;"></div>
            </div>
            <select id="search-sort" title="Sort order">
              <option value="relevance">Relevance</option>
              <option value="views">Most Viewed</option>
            </select>
            <button id="search-btn" onclick="doSearch()" title="Search">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
              </svg>
            </button>
          </div>
          <div class="search-filter-row" id="search-filter-row" style="display:none;">
            <span class="filter-label">Duration</span>
            <button class="filter-chip active" data-filter="all"    onclick="setDurationFilter('all')">All</button>
            <button class="filter-chip"        data-filter="short"  onclick="setDurationFilter('short')">Under 10m</button>
            <button class="filter-chip"        data-filter="medium" onclick="setDurationFilter('medium')">10–30m</button>
            <button class="filter-chip"        data-filter="long"   onclick="setDurationFilter('long')">Over 30m</button>
            <span class="filter-count" id="filter-count"></span>
          </div>
        </div>

        <!-- Results -->
        <div id="results-area">
          <div class="empty-state">
            <div class="icon">🎬</div>
            <p>Search for music to get started</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Right panel: Queue + Playlists -->
    <div id="right-panel">
      <div class="right-tab-bar">
        <button class="right-tab-btn active" id="rtab-queue" onclick="switchRightTab('queue')">Queue</button>
        <button class="right-tab-btn" id="rtab-playlists" onclick="switchRightTab('playlists')">Playlists</button>
      </div>

      <!-- Queue view -->
      <div id="queue-view" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
        <div class="queue-header">
          <span class="queue-count" id="queue-count">0 tracks</span>
          <div class="queue-mode-btns">
            <button class="queue-mode-btn" id="shuffle-btn" onclick="toggleShuffle()" title="Shuffle queue">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button class="queue-mode-btn" id="repeat-btn" onclick="toggleRepeat()" title="Loop queue">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
          </div>
          <button class="queue-clear-btn" onclick="api.clearQueue()">Clear</button>
        </div>
        <div id="queue-list">
          <div class="queue-empty">
            <span class="icon">📭</span>
            <span>Queue is empty</span>
          </div>
        </div>
      </div>

      <!-- Playlists view -->
      <div id="playlists-panel" style="display:none; flex:1; overflow:hidden; flex-direction:column; min-height:0;">
        <div id="playlists-grid-view" style="flex:1; overflow-y:auto; min-height:0;">
          <div id="playlists-grid" class="playlist-grid"></div>
        </div>
        <div id="playlist-track-view" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
          <div id="playlist-track-header">
            <button id="playlist-back-btn" onclick="backToPlaylists()">← Back</button>
            <div id="playlist-track-info">
              <span id="playlist-track-title"></span>
              <span id="playlist-track-count"></span>
            </div>
            <button id="playlist-add-all-btn">+ Add All to Queue</button>
          </div>
          <div id="playlist-track-list"></div>
          <div id="playlist-load-more" style="display:none;">
            <button onclick="loadMoreTracks()">Load More Tracks</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span class="status-msg" id="status-msg">Ready</span>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const PLAY_ICON = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  const PAUSE_ICON = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

  let queue = [];
  let isPlayingState = false;
  let dragSrcIndex = null;
  let nowPlayingIndex = -1;
  let savedChannelId = '';
  let botInChannel = false;

  // ── Event listeners from main ──────────────────────────────────────────────


  api.on('queue-updated', (data) => {
    // Support both old array format and new {tracks, currentIndex} format
    if (Array.isArray(data)) {
      queue = data;
    } else {
      queue = data.tracks || [];
      nowPlayingIndex = data.currentIndex ?? -1;
    }
    renderQueue();
  });

  api.on('now-playing', (track) => {
    const title = document.getElementById('np-title');
    const channel = document.getElementById('np-channel');
    const pauseBtn = document.getElementById('pause-btn');
    const idle = document.getElementById('np-banner-idle');
    const active = document.getElementById('np-banner-active');

    if (!track) {
      title.textContent = 'Nothing playing';
      title.classList.add('np-idle');
      channel.textContent = '';
      pauseBtn.innerHTML = PLAY_ICON;
      idle.style.display = 'flex';
      active.style.display = 'none';
      isPlayingState = false;
      return;
    }
    isPlayingState = true;

    addToSessionLog(track);
    title.textContent = track.title;
    title.classList.remove('np-idle');
    channel.textContent = track.channel + ' · ' + track.duration;
    pauseBtn.innerHTML = PAUSE_ICON;

    // Update banner
    idle.style.display = 'none';
    active.style.display = 'block';
    document.getElementById('np-banner-thumb').src = track.thumbnail || '';
    document.getElementById('np-banner-title').textContent = track.title;
    document.getElementById('np-banner-channel').innerHTML = `
      ${escHtml(track.channel)} · ${track.duration}
      <div class="eq-bars">
        <div class="eq-bar"></div><div class="eq-bar"></div>
        <div class="eq-bar"></div><div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>`;
  });

  api.on('playback-state', ({ paused }) => {
    isPlayingState = !paused;
    document.getElementById('pause-btn').innerHTML = paused ? PLAY_ICON : PAUSE_ICON;
  });

  // Reset button when queue finishes
  api.on('status', ({ message, type }) => {
    const el = document.getElementById('status-msg');
    el.textContent = message;
    el.className = 'status-msg ' + (type || '');
    showToast(message, type);
    if (message === 'Queue finished') {
      isPlayingState = false;
      document.getElementById('pause-btn').innerHTML = PLAY_ICON;
    }
  });

  // ── Seek ───────────────────────────────────────────────────────────────────
  let seekDragging  = false;
  let seekLockUntil = 0;
  let currentDuration = 0;

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  const seekSlider    = document.getElementById('seek-slider');
  const seekFillEl    = document.getElementById('seek-fill-overlay');

  function setSeekFill(pct) {
    if (seekFillEl) seekFillEl.style.width = pct + '%';
  }

  seekSlider.addEventListener('pointerdown', () => { seekDragging = true; });
  document.addEventListener('pointerup', () => {
    if (!seekDragging) return;
    seekDragging = false;
    if (!currentDuration) return;
    const secs = Math.floor((seekSlider.value / 100) * currentDuration);
    seekLockUntil = Date.now() + 1200;
    setSeekFill(seekSlider.value);
    api.seekTo(secs);
  });
  seekSlider.addEventListener('input', () => {
    if (!currentDuration) return;
    setSeekFill(seekSlider.value);
    document.getElementById('seek-current').textContent =
      formatTime(Math.floor((seekSlider.value / 100) * currentDuration));
  });

  api.on('seek-progress', (data) => {
    const { current, duration } = data;
    currentDuration = duration;
    if (seekDragging || Date.now() < seekLockUntil) return;
    const pct   = duration > 0 ? (current / duration) * 100 : 0;
    const curEl = document.getElementById('seek-current');
    const totEl = document.getElementById('seek-total');
    seekSlider.value = pct;
    setSeekFill(pct);
    if (curEl) curEl.textContent = formatTime(current);
    if (totEl) totEl.textContent = formatTime(duration);
  });

  api.on('now-playing-id', (_id) => {
    renderQueue();
  });

  // ── Session Log ────────────────────────────────────────────────────────────
  // Keeps a list of up to 15 tracks played this session, most recent first.
  // Click + on any item to add it back to the queue.
  const SESSION_LOG_MAX = 15;
  let sessionLog = [];

  function addToSessionLog(track) {
    if (!track) return;
    // Move to front if already in log, otherwise prepend
    sessionLog = [track, ...sessionLog.filter(t => t.id !== track.id)];
    if (sessionLog.length > SESSION_LOG_MAX) sessionLog = sessionLog.slice(0, SESSION_LOG_MAX);
    renderSessionLog();
  }

  function renderSessionLog() {
    const list = document.getElementById('session-log-list');
    if (sessionLog.length === 0) {
      list.innerHTML = '<div class="session-log-empty">No tracks played yet</div>';
      return;
    }
    list.innerHTML = '';
    sessionLog.forEach(track => {
      const item = document.createElement('div');
      item.className = 'session-log-item';
      item.title = track.title;
      item.innerHTML = `
        <img class="session-log-thumb" src="${track.thumbnail}"
          onerror="this.style.background='var(--surface3)';this.src=''" />
        <div class="session-log-info">
          <div class="session-log-title">${escHtml(track.title)}</div>
          <div class="session-log-dur">${track.duration}</div>
        </div>
        <button class="session-log-add" title="Add to queue">+</button>
      `;
      item.querySelector('.session-log-add').addEventListener('click', (e) => {
        e.stopPropagation();
        api.addToQueue(track);
        e.target.textContent = '✓';
        setTimeout(() => e.target.textContent = '+', 1500);
      });
      item.addEventListener('dblclick', () => api.playTrackNow(track));
      list.appendChild(item);
    });
  }

  api.on('bot-ready', ({ username, voiceChannels }) => {
    document.getElementById('bot-dot').className = 'status-dot online';
    document.getElementById('bot-status-text').textContent = username;
    document.getElementById('bot-setup').style.display = 'none';
    document.getElementById('channel-section').style.display = 'block';

    const sel = document.getElementById('channel-select');
    sel.innerHTML = '<option value="">Select channel...</option>';
    voiceChannels.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = '🔊 ' + c.name;
      sel.appendChild(opt);
    });

    // Pre-select last used channel so it's one click to join
    const savedChannel = sel.querySelector(`option[value="${savedChannelId}"]`);
    if (savedChannel) sel.value = savedChannelId;
  });

  api.on('bot-disconnected', () => {
    botInChannel = false;
    document.getElementById('bot-dot').className = 'status-dot';
    document.getElementById('bot-status-text').textContent = 'Not connected';
    document.getElementById('bot-setup').style.display = 'block';
    document.getElementById('channel-section').style.display = 'none';
  });

  api.on('config-loaded', (cfg) => {
    // Fade out splash screen
    const splash = document.getElementById('splash');
    splash.classList.add('fade-out');
    setTimeout(() => splash.remove(), 520);

    if (cfg.volume) {
      document.getElementById('volume-slider').value = cfg.volume;
      document.getElementById('vol-display').textContent = cfg.volume + '%';
    }
    // Always pre-fill fields so user can see/edit them
    if (cfg.botToken) document.getElementById('bot-token').value = cfg.botToken;
    if (cfg.guildId) document.getElementById('guild-id').value = cfg.guildId;
    if (cfg.channelId) savedChannelId = cfg.channelId;

    // Auto-connect after short delay to ensure renderer is fully ready
    if (cfg.botToken && cfg.guildId) {
      document.getElementById('bot-status-text').textContent = 'Connecting...';
      setTimeout(async () => {
        const res = await api.connectBot({ token: cfg.botToken, guildId: cfg.guildId });
        if (!res.success) {
          document.getElementById('bot-dot').className = 'status-dot error';
          document.getElementById('bot-status-text').textContent = 'Error - check token';
        // Don't auto-join channel - user picks manually
        }
      }, 1500);
    }
  });

  // ── Right panel tabs ────────────────────────────────────────────────────────
  function switchRightTab(tab) {
    const queueView = document.getElementById('queue-view');
    const playlistsPanel = document.getElementById('playlists-panel');
    const tabQueue = document.getElementById('rtab-queue');
    const tabPlaylists = document.getElementById('rtab-playlists');

    if (tab === 'queue') {
      queueView.style.display = 'flex';
      playlistsPanel.style.display = 'none';
      tabQueue.classList.add('active');
      tabPlaylists.classList.remove('active');
    } else {
      queueView.style.display = 'none';
      playlistsPanel.style.display = 'flex';
      tabQueue.classList.remove('active');
      tabPlaylists.classList.add('active');
      loadPlaylists();
    }
  }

  let playlistsLoaded = false;
  let currentPlaylist = null;
  let currentPlaylistTracks = [];
  let currentPlaylistOffset = 0;
  const TRACKS_PER_PAGE = 50;

  async function loadPlaylists() {
    if (playlistsLoaded) return;
    const grid = document.getElementById('playlists-grid');
    grid.innerHTML = '<div class="searching-spinner" style="grid-column:1/-1"><div class="spinner"></div><span>Loading playlists...</span></div>';

    // Check auth status first
    const auth = await api.getAuthStatus();
    if (!auth.authenticated) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;gap:16px;">
          <div class="icon" style="font-size:32px;opacity:0.4;">🔗</div>
          ${!auth.hasCredentials ? `
            <p style="font-size:11px;text-align:center;color:var(--muted);line-height:1.6;max-width:220px;">
              Create a <strong style="color:var(--text);">yt-credentials.json</strong> file in your TableTunes folder with your Google API credentials first.
            </p>
          ` : `
            <p style="font-size:12px;color:var(--muted);">Connect your YouTube account</p>
            <button onclick="connectYouTube()" class="btn btn-primary" style="width:auto;padding:8px 20px;font-size:12px;">
              Connect YouTube
            </button>
          `}
        </div>`;
      return;
    }

    const playlists = await api.fetchPlaylists();
    // Only mark as loaded if we got results, so retry is possible on error
    if (playlists && playlists.length > 0) playlistsLoaded = true;

    if (!playlists || playlists.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📭</div><p>No playlists found</p></div>';
      return;
    }

    grid.innerHTML = '';
    playlists.forEach(pl => {
      const card = document.createElement('div');
      card.className = 'playlist-card';
      card.innerHTML = `
        <img class="playlist-thumb" src="${pl.thumbnail || ''}" onerror="this.style.background='var(--surface3)';this.src=''" />
        <div class="playlist-info">
          <div class="playlist-name">${escHtml(pl.title)}</div>
          <div class="playlist-meta" id="count-${pl.id}">${pl.count === '?' ? '...' : pl.count + (pl.count === 1 ? ' track' : ' tracks')}</div>
        </div>
        <button class="playlist-add-btn">+ Add to Queue</button>
      `;
      // Click card body = open track view
      card.addEventListener('click', (e) => {
        if (e.target.classList.contains('playlist-add-btn')) return;
        openPlaylist(pl);
      });
      // Click add button = add all to queue
      card.querySelector('.playlist-add-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        card.classList.add('loading');
        card.querySelector('.playlist-add-btn').textContent = 'Loading...';
        const tracks = await api.fetchPlaylistTracks({ url: pl.url, title: pl.title, limit: 200, offset: 0 });
        tracks.forEach(t => api.addToQueue(t));
        card.classList.remove('loading');
        card.querySelector('.playlist-add-btn').textContent = `✓ Added ${tracks.length}!`;
        setTimeout(() => { card.querySelector('.playlist-add-btn').textContent = '+ Add to Queue'; }, 2000);
      });
      grid.appendChild(card);
    });
  }

  async function openPlaylist(pl) {
    currentPlaylist = pl;
    currentPlaylistTracks = [];
    currentPlaylistOffset = 0;

    // Switch to track view
    document.getElementById('playlists-grid-view').style.display = 'none';
    const trackView = document.getElementById('playlist-track-view');
    trackView.style.display = 'flex';
    trackView.style.flexDirection = 'column';

    document.getElementById('playlist-track-title').textContent = pl.title;
    document.getElementById('playlist-track-count').textContent = `${pl.count} tracks`;
    document.getElementById('playlist-track-list').innerHTML = 
      '<div class="searching-spinner"><div class="spinner"></div><span>Loading tracks...</span></div>';
    document.getElementById('playlist-load-more').style.display = 'none';

    // Add all button
    document.getElementById('playlist-add-all-btn').onclick = async () => {
      const btn = document.getElementById('playlist-add-all-btn');
      btn.textContent = 'Loading...';
      btn.disabled = true;
      const tracks = await api.fetchPlaylistTracks({ url: pl.url, title: pl.title, limit: 200, offset: 0 });
      tracks.forEach(t => api.addToQueue(t));
      btn.textContent = `✓ Added ${tracks.length}!`;
      btn.disabled = false;
      setTimeout(() => { btn.textContent = '+ Add All to Queue'; }, 2000);
    };

    await loadPlaylistTracks();
  }

  async function loadPlaylistTracks() {
    const tracks = await api.fetchPlaylistTracks({
      url: currentPlaylist.url,
      title: currentPlaylist.title,
      limit: TRACKS_PER_PAGE,
      offset: currentPlaylistOffset
    });

    currentPlaylistTracks.push(...tracks);
    renderPlaylistTracks(tracks, currentPlaylistOffset);
    currentPlaylistOffset += tracks.length;

    // Show load more if we got a full page
    const loadMore = document.getElementById('playlist-load-more');
    loadMore.style.display = tracks.length >= TRACKS_PER_PAGE ? 'block' : 'none';
  }

  function renderPlaylistTracks(tracks, offset) {
    const list = document.getElementById('playlist-track-list');
    if (offset === 0) list.innerHTML = '';

    if (tracks.length === 0 && offset === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No tracks found</p></div>';
      return;
    }

    tracks.forEach((track, i) => {
      const num = offset + i + 1;
      const item = document.createElement('div');
      item.className = 'pl-track-item';
      item.innerHTML = `
        <span class="pl-track-num">${num}</span>
        <div class="pl-thumb-wrap">
          <img class="pl-track-thumb" src="${track.thumbnail}" onerror="this.style.background='var(--surface3)';this.src=''" />
          <div class="pl-thumb-overlay">
            <button class="pl-thumb-play">▶</button>
          </div>
        </div>
        <div class="pl-track-info">
          <div class="pl-track-title">${escHtml(track.title)}</div>
          <div class="pl-track-meta">
            <span>${escHtml(track.channel)}</span>
            <span>${track.duration}</span>
          </div>
        </div>
        <button class="pl-queue-btn" title="Add to queue">+</button>
      `;
      item.querySelector('.pl-thumb-play').addEventListener('click', (e) => {
        e.stopPropagation();
        if (!botInChannel) { showToast('Join a voice channel first', 'error'); return; }
        api.clearQueue();
        api.playTrackNow(track);
        const remaining = currentPlaylistTracks.slice(offset + i + 1);
        remaining.forEach(t => api.addToQueue(t));
      });
      item.querySelector('.pl-queue-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        api.addToQueue(track);
        e.target.textContent = '✓';
        setTimeout(() => e.target.textContent = '+', 1500);
      });
      item.addEventListener('dblclick', () => {
        if (!botInChannel) { showToast('Join a voice channel first', 'error'); return; }
        api.playTrackNow(track);
      });
      list.appendChild(item);
    });
  }

  async function loadMoreTracks() {
    const btn = document.querySelector('#playlist-load-more button');
    btn.textContent = 'Loading...';
    btn.disabled = true;
    await loadPlaylistTracks();
    btn.textContent = 'Load More Tracks';
    btn.disabled = false;
  }

  async function connectYouTube() {
    const grid = document.getElementById('playlists-grid');
    grid.innerHTML = '<div class="searching-spinner" style="grid-column:1/-1"><div class="spinner"></div><span>Opening browser for Google login...</span></div>';
    const result = await api.authYoutube();
    if (result.success) {
      playlistsLoaded = false;
      showToast('YouTube connected!', 'success');
      loadPlaylists();
    } else {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;gap:14px;">
          <div class="icon" style="font-size:28px;opacity:0.4;">⚠️</div>
          <p style="font-size:11px;color:var(--muted);text-align:center;max-width:220px;">${result.error || 'Auth failed'}</p>
          <button onclick="connectYouTube()" class="btn btn-primary" style="width:auto;padding:8px 20px;font-size:12px;">Try Again</button>
        </div>`;
      showToast(`Auth failed: ${result.error}`, 'error');
    }
  }

  function backToPlaylists() {
    document.getElementById('playlists-grid-view').style.display = 'block';
    document.getElementById('playlist-track-view').style.display = 'none';
    currentPlaylist = null;
    currentPlaylistTracks = [];
    currentPlaylistOffset = 0;
  }

  // ── Search ─────────────────────────────────────────────────────────────────

  const SEARCH_PAGE_SIZE = 50;
  const YT_URL_RE = /^https?:\/\/(www\.)?(youtube\.com|youtu\.be)\//;

  let searchResults        = [];
  let searchQuery          = '';
  let searchSort           = 'relevance';
  let searchOffset         = 0;
  let searchDurationFilter = 'all';
  let searchHistory        = [];
  let searchIsUrl          = false;

  function onSearchInput(val) {
    searchIsUrl = YT_URL_RE.test(val.trim());
    document.getElementById('search-input').classList.toggle('is-url', searchIsUrl);
    const sort = document.getElementById('search-sort');
    sort.style.opacity = searchIsUrl ? '0.4' : '1';
    sort.style.pointerEvents = searchIsUrl ? 'none' : '';
    const dropdown = document.getElementById('search-history-dropdown');
    if (dropdown.style.display !== 'none') renderHistoryDropdown(val);
  }

  function addToSearchHistory(query) {
    if (!query || YT_URL_RE.test(query)) return;
    searchHistory = [query, ...searchHistory.filter(h => h !== query)].slice(0, 10);
  }

  function showSearchHistory() {
    const val = document.getElementById('search-input').value;
    const matches = searchHistory.filter(h => !val || h.toLowerCase().includes(val.toLowerCase()));
    if (matches.length === 0) return;
    renderHistoryDropdown(val);
    document.getElementById('search-history-dropdown').style.display = 'block';
  }

  function hideSearchHistory() {
    setTimeout(() => {
      document.getElementById('search-history-dropdown').style.display = 'none';
    }, 160);
  }

  function renderHistoryDropdown(val) {
    const dropdown = document.getElementById('search-history-dropdown');
    const matches = searchHistory.filter(h => !val || h.toLowerCase().includes(val.toLowerCase()));
    if (matches.length === 0) { dropdown.style.display = 'none'; return; }
    dropdown.innerHTML = matches.map(h => `
      <div class="search-history-item" onmousedown="selectHistory(${JSON.stringify(h)})">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.4;flex-shrink:0">
          <path d="M13 3a9 9 0 1 0 0 18A9 9 0 0 0 13 3zM11 8h2v5.414l2.293 2.293-1.414 1.414L11 14.414V8z"/>
        </svg>
        ${escHtml(h)}
      </div>`).join('');
  }

  function selectHistory(query) {
    document.getElementById('search-input').value = query;
    onSearchInput(query);
    doSearch();
  }

  function setDurationFilter(filter) {
    searchDurationFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(c =>
      c.classList.toggle('active', c.dataset.filter === filter));
    renderSearchResults();
  }

  function getFilteredResults() {
    if (searchDurationFilter === 'all') return searchResults;
    return searchResults.filter(t => {
      const s = t.durationSec;
      if (searchDurationFilter === 'short')  return s > 0 && s < 600;
      if (searchDurationFilter === 'medium') return s >= 600 && s < 1800;
      if (searchDurationFilter === 'long')   return s >= 1800;
      return true;
    });
  }

  async function doSearch() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;

    searchQuery  = query;
    searchOffset = 0;
    searchResults = [];
    searchSort   = document.getElementById('search-sort').value;
    searchIsUrl  = YT_URL_RE.test(query);
    searchDurationFilter = 'all';
    document.querySelectorAll('.filter-chip').forEach(c =>
      c.classList.toggle('active', c.dataset.filter === 'all'));

    addToSearchHistory(query);
    hideSearchHistory();

    const area = document.getElementById('results-area');
    area.innerHTML = '<div class="searching-spinner"><div class="spinner"></div><span>Searching...</span></div>';
    document.getElementById('search-filter-row').style.display = 'none';

    const results = await api.search({ query, sort: searchSort, offset: 0, limit: SEARCH_PAGE_SIZE });

    if (!results || results.length === 0) {
      area.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No results found</p></div>';
      return;
    }

    searchResults = results;
    searchOffset  = results.length;
    if (!searchIsUrl) document.getElementById('search-filter-row').style.display = 'flex';
    renderSearchResults();
  }

  async function loadMoreResults() {
    if (!searchQuery || searchIsUrl) return;
    const btn = document.querySelector('.search-load-more button');
    if (btn) { btn.textContent = 'Loading...'; btn.disabled = true; }

    const results = await api.search({ query: searchQuery, sort: searchSort, offset: searchOffset, limit: SEARCH_PAGE_SIZE });
    if (results && results.length > 0) {
      searchResults.push(...results);
      searchOffset += results.length;
    }
    renderSearchResults();
  }

  function formatViewCount(n) {
    if (!n) return null;
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M views';
    if (n >= 1000)    return Math.round(n / 1000) + 'K views';
    return n + ' views';
  }

  function formatUploadDate(d) {
    if (!d || d.length !== 8) return null;
    const date = new Date(`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`);
    const days = Math.floor((Date.now() - date) / 86400000);
    if (days < 1)   return 'Today';
    if (days < 7)   return days + 'd ago';
    if (days < 30)  return Math.floor(days / 7) + 'w ago';
    if (days < 365) return Math.floor(days / 30) + 'mo ago';
    return Math.floor(days / 365) + 'y ago';
  }

  function renderSearchResults() {
    let filtered = getFilteredResults();

    // Sort by view count descending when "Most Viewed" selected.
    // Results with no viewCount (null) are pushed to the end.
    if (searchSort === 'views') {
      filtered = [...filtered].sort((a, b) => {
        if (a.viewCount == null && b.viewCount == null) return 0;
        if (a.viewCount == null) return 1;
        if (b.viewCount == null) return -1;
        return b.viewCount - a.viewCount;
      });
    }
    const area     = document.getElementById('results-area');

    const countEl = document.getElementById('filter-count');
    if (countEl) {
      countEl.textContent = searchDurationFilter === 'all'
        ? searchResults.length + ' results'
        : filtered.length + ' of ' + searchResults.length;
    }

    if (filtered.length === 0) {
      area.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No results match this filter</p></div>';
      return;
    }

    area.innerHTML = '';
    filtered.forEach((track) => {
      const item = document.createElement('div');
      item.className = 'result-item';

      const badges = [];
      if (searchIsUrl) badges.push('<span class="result-badge url-badge">Direct URL</span>');
      const views = formatViewCount(track.viewCount);
      const date  = formatUploadDate(track.uploadDate);
      if (views) badges.push(`<span class="result-badge">${escHtml(views)}</span>`);
      if (date)  badges.push(`<span class="result-badge">${escHtml(date)}</span>`);
      const badgesHtml = badges.length ? `<div class="result-badges">${badges.join('')}</div>` : '';

      item.innerHTML = `
        <div class="result-thumb-wrap">
          <img class="result-thumb" src="${track.thumbnail}" onerror="this.style.background='var(--surface3)';this.src=''" />
          <div class="result-thumb-overlay"><button class="result-thumb-play">▶</button></div>
        </div>
        <div class="result-info">
          <div class="result-title">${escHtml(track.title)}</div>
          <div class="result-meta">
            <span>${escHtml(track.channel)}</span>
            <span>${track.duration}</span>
          </div>
          ${badgesHtml}
        </div>
        <button class="result-queue-btn" title="Add to queue">+</button>
      `;

      item.querySelector('.result-thumb-play').addEventListener('click', (e) => {
        e.stopPropagation();
        api.playTrackNow(track);
      });
      item.querySelector('.result-queue-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        api.addToQueue(track);
        e.target.textContent = '✓';
        setTimeout(() => e.target.textContent = '+', 1500);
      });
      item.addEventListener('dblclick', () => api.playTrackNow(track));
      area.appendChild(item);
    });

    // Load more button — only for keyword searches that returned a full page
    if (!searchIsUrl && searchResults.length >= SEARCH_PAGE_SIZE) {
      const div = document.createElement('div');
      div.className = 'search-load-more';
      div.innerHTML = '<button onclick="loadMoreResults()">Load More Results</button>';
      area.appendChild(div);
    }
  }

  // ── Queue ──────────────────────────────────────────────────────────────────
  function renderQueue() {
    const list = document.getElementById('queue-list');
    document.getElementById('queue-count').textContent = queue.length + ' track' + (queue.length !== 1 ? 's' : '');

    if (queue.length === 0) {
      list.innerHTML = '<div class="queue-empty"><span class="icon">📭</span><span>Queue is empty</span></div>';
      return;
    }

    list.innerHTML = '';
    queue.forEach((track, i) => {
      const item = document.createElement('div');
      item.className = 'queue-item' + (i === nowPlayingIndex ? ' now-playing' : '');
      item.draggable = true;
      item.dataset.index = i;

      item.innerHTML = `
        <span class="queue-num">${i + 1}</span>
        <div class="queue-thumb-wrap">
          <img class="queue-thumb" src="${track.thumbnail}" onerror="this.style.background='var(--surface3)';this.src=''" />
          <div class="queue-thumb-overlay"><button class="queue-thumb-play">▶</button></div>
        </div>
        <div class="queue-info">
          <div class="queue-title">${escHtml(track.title)}</div>
          <div class="queue-dur">${track.duration}</div>
        </div>
        <button class="queue-remove" onclick="api.removeFromQueue(${i})">✕</button>
      `;
      item.querySelector('.queue-thumb-play').addEventListener('click', (e) => {
        e.stopPropagation();
        api.playFromQueueIndex(i);
      });

      item.addEventListener('dragstart', (e) => {
        dragSrcIndex = i;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => item.classList.remove('dragging'));
      item.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.queue-item').forEach(el => el.classList.remove('drag-over'));
        item.classList.add('drag-over');
      });
      item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
      item.addEventListener('drop', (e) => {
        e.preventDefault();
        item.classList.remove('drag-over');
        if (dragSrcIndex !== null && dragSrcIndex !== i) {
          api.moveQueueItem(dragSrcIndex, i);
        }
        dragSrcIndex = null;
      });

      list.appendChild(item);
    });
  }

  // ── Bot ────────────────────────────────────────────────────────────────────
  async function connectBot() {
    const token = document.getElementById('bot-token').value.trim();
    const guildId = document.getElementById('guild-id').value.trim();
    if (!token || !guildId) { showToast('Enter bot token and server ID', 'error'); return; }

    document.getElementById('bot-status-text').textContent = 'Connecting...';
    const res = await api.connectBot({ token, guildId });
    if (!res.success) {
      document.getElementById('bot-dot').className = 'status-dot error';
      document.getElementById('bot-status-text').textContent = 'Error';
      showToast(res.error, 'error');
    }
  }

  async function joinChannel() {
    const channelId = document.getElementById('channel-select').value;
    if (!channelId) { showToast('Select a voice channel', 'error'); return; }
    const channelName = document.getElementById('channel-select').selectedOptions[0]?.text || 'Channel';
    const res = await api.joinChannel(channelId);
    if (res.success) {
      botInChannel = true;
      // Change Join button to show connected state
      const joinBtn = document.querySelector('#channel-section .btn-primary');
      if (joinBtn) {
        joinBtn.textContent = channelName;
        joinBtn.className = 'btn btn-in-channel';
        joinBtn.onclick = null; // disable clicking while in channel
      }
    } else {
      showToast(res.error, 'error');
    }
  }

  function leaveChannel() {
    botInChannel = false;
    api.leaveChannel();
    // Revert Join button
    const joinBtn = document.querySelector('#channel-section .btn-in-channel');
    if (joinBtn) {
      joinBtn.textContent = 'Join Channel';
      joinBtn.className = 'btn btn-primary';
      joinBtn.onclick = joinChannel;
    }
  }

  // ── Volume ─────────────────────────────────────────────────────────────────
  let shuffleOn = false;
  let repeatOn = false;

  let skipLocked = false;

  function handlePlayPause() {
    if (!botInChannel) { showToast('Join a voice channel first', 'error'); return; }
    if (!isPlayingState) {
      if (queue.length > 0) {
        if (nowPlayingIndex === -1) {
          api.playFromQueueIndex(0);
        } else {
          api.pause();
        }
      }
    } else {
      api.pause();
    }
  }

  function restartTrack() {
    if (!botInChannel) { showToast('Join a voice channel first', 'error'); return; }
    if (!isPlayingState) { showToast('Nothing playing to restart', 'error'); return; }
    api.seekTo(0);
  }

  function doSkip(btn) {
    if (!botInChannel) { showToast('Join a voice channel first', 'error'); return; }
    if (!isPlayingState && queue.length === 0) { showToast('Queue is empty', 'error'); return; }
    // Warn if there's nowhere to skip to
    const isLast = nowPlayingIndex >= queue.length - 1;
    if (isLast && !shuffleOn && !repeatOn) {
      showToast('End of queue', 'info');
      return;
    }
    if (skipLocked) return;
    skipLocked = true;
    btn.style.opacity = '0.4';
    api.skip();
    setTimeout(() => {
      skipLocked = false;
      btn.style.opacity = '';
    }, 1000);
  }

  function toggleShuffle() {
    shuffleOn = !shuffleOn;
    api.setShuffle(shuffleOn);
    document.getElementById('shuffle-btn').classList.toggle('active', shuffleOn);
  }

  function toggleRepeat() {
    repeatOn = !repeatOn;
    api.setRepeat(repeatOn);
    document.getElementById('repeat-btn').classList.toggle('active', repeatOn);
  }

  function onVolume(val) {
    document.getElementById('vol-display').textContent = val + '%';
    api.setVolume(parseInt(val));
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = type === 'error' ? 'var(--accent)' : type === 'success' ? 'var(--success)' : 'var(--border)';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
